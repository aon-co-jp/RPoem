<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>open-runo Desktop</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      body { overflow-x: hidden; }
      #sidebar {
        width: 220px;
        min-height: 100vh;
        background: var(--bs-dark);
        border-right: 1px solid var(--bs-border-color);
        flex-shrink: 0;
      }
      #sidebar .nav-link {
        color: var(--bs-secondary-color);
        border-radius: 0.375rem;
        margin: 2px 8px;
      }
      #sidebar .nav-link:hover,
      #sidebar .nav-link.active {
        color: var(--bs-light);
        background: var(--bs-secondary-bg);
      }
      #sidebar .nav-link i { width: 1.25rem; }
      #content { flex: 1; overflow-y: auto; padding: 1.5rem; }
      .status-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        display: inline-block;
      }
      .status-dot.ok   { background: #198754; }
      .status-dot.err  { background: #dc3545; }
      .code-block {
        background: var(--bs-secondary-bg);
        border-radius: 0.375rem;
        padding: 0.75rem 1rem;
        font-family: monospace;
        font-size: 0.85rem;
        white-space: pre-wrap;
        word-break: break-all;
      }
    </style>
  </head>
  <body class="d-flex" style="min-height:100vh;">

    <!-- Sidebar -->
    <nav id="sidebar" class="d-flex flex-column py-3">
      <div class="px-3 mb-3">
        <span class="fw-bold text-light fs-6">
          <i class="bi bi-hexagon-fill text-primary me-1"></i>open-runo
        </span>
        <div class="mt-1">
          <span class="status-dot ok" id="health-dot"></span>
          <small id="health-label" class="text-secondary ms-1">connecting…</small>
        </div>
      </div>

      <ul class="nav flex-column gap-1">
        <li class="nav-item">
          <a class="nav-link active" data-page="dashboard" href="#">
            <i class="bi bi-grid-1x2-fill"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-page="schemas" href="#">
            <i class="bi bi-file-code"></i> Schema Registry
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-page="federation" href="#">
            <i class="bi bi-diagram-3-fill"></i> Federation
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-page="ai-routing" href="#">
            <i class="bi bi-robot"></i> AI Routing
          </a>
        </li>
      </ul>

      <div class="mt-auto px-3">
        <small class="text-secondary">v0.1.0 · Tauri 2</small>
      </div>
    </nav>

    <!-- Main content -->
    <main id="content"></main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
